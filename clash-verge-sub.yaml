  - RULE-SET,OpenAI,🤖 AI 服务
  - RULE-SET,Claude,🤖 AI 服务
  - RULE-SET,Gemini,🤖 AI 服务
  - RULE-SET,Copilot,🤖 AI 服务
  - RULE-SET,GitHub,🤖 AI 服务

  - DOMAIN-KEYWORD,instagram,♨️ Lifestyle
  - DOMAIN-KEYWORD,pinterest,♨️ Lifestyle
  - DOMAIN-KEYWORD,twitter,♨️ Lifestyle
  - DOMAIN-KEYWORD,spotify,♨️ Lifestyle
