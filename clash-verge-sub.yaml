port: 7890
socks-port: 7891
allow-lan: true
mode: rule
log-level: info
external-controller: 127.0.0.1:9090
proxy-providers:
  Provider_42DAC0:
    type: http
    url: https://gist.githubusercontent.com/bassdrum007/4f1ed83a77cf2b12102a5549271c37e0/raw/GitAfica
    interval: 3600
    proxy: DIRECT
    path: ./providers/Provider_42DAC0.yaml
    exclude-filter: (到期|剩余流量|时间|官网|产品)
    health-check:
      enable: true
      url: https://cp.cloudflare.com/generate_204
      interval: 300
    override:
      skip-cert-verify: true
      udp: true
proxy-groups:
  - name: 🎯 总模式
    type: select
    proxies:
      - Ⓜ️ 延迟最低
      - 👉 手动切换
      - DIRECT
  - name: Ⓜ️ 延迟最低
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    use:
      - Provider_42DAC0
    filter: (港|HK|Hong Kong|台|新北|彰化|TW|Taiwan|日本|川日|东京|大阪|泉日|埼玉|沪日|深日|[^-]日|JP|Japan|KR|Korea|KOR|首尔|韩|韓|新加坡|坡|狮城|SG|Singapore|美|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|US|United States)
  - name: 👉 手动切换
    type: select
    use:
      - Provider_42DAC0
    filter: ^(?!.*(?:流量|GB|Expire|Until|到期|套餐|🈳|🈵|🉑)).*(港|HK|Hong Kong|台|新北|彰化|TW|Taiwan|日本|川日|东京|大阪|泉日|埼玉|沪日|深日|[^-]JP|Japan|新加坡|坡|狮城|SG|Singapore|美|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|US|United States)
  - name: 🇨🇳 国内网站
    type: select
    proxies:
      - DIRECT
      - 🎯 总模式
  - name: 🛑 广告拦截
    type: select
    proxies:
      - REJECT
      - DIRECT
  - name: ⭕ 漏网之鱼
    type: select
    proxies:
      - 🎯 总模式
      - DIRECT
