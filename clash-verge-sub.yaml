# Clash Verge 订阅配置 — 直接使用，不经过 subconverter
# 更新: 2026-06-28

port: 7890
socks-port: 7891
allow-lan: true
mode: rule
log-level: info
external-controller: 127.0.0.1:9090
secret: ""

proxy-providers:
  AllNodes:
    type: http
    url: https://gist.githubusercontent.com/bassdrum007/4f1ed83a77cf2b12102a5549271c37e0/raw/GitAfica
    interval: 3600
    path: ./providers/AllNodes.yaml
    proxy: DIRECT
    health-check:
      enable: true
      url: http://cp.cloudflare.com/generate_204
      interval: 300
    override:
      skip-cert-verify: true
      udp: true

proxy-groups:
  - name: 📶 流量
    type: select
    use: [AllNodes]
    filter: "(500|GB|Expire|Until|流量|到期|套餐|🈳|🈵|🉑)"

  - name: 🎯 总模式
    type: select
    proxies: [✈️ 机场, 🇭🇰 香港节点, 🇼🇸 台湾节点, 🇯🇵 日本节点, 🇰🇷 韩国节点, 🇸🇬 狮城节点, 🇺🇸 美国节点, 🛠️ 特殊节点, 👉 手动切换, DIRECT]

  - name: ✈️ 机场
    type: select
    proxies: [✈️ Africa, ✈️ 翟, ✈️ WD, ✈️ 付]

  - name: ✈️ Africa
    type: url-test
    url: http://cp.cloudflare.com/generate_204
    interval: 120
    use: [AllNodes]
    filter: "^(?!.*(500|Day|Expire|Traffic|Until|剩余|流量|到期|套餐|🈳|🈵|🉑)).*(Imm|Nexitally).*$"

  - name: ✈️ 翟
    type: url-test
    url: http://cp.cloudflare.com/generate_204
    interval: 120
    use: [AllNodes]
    filter: "^(?!.*(500|Day|Expire|Traffic|Until|剩余|流量|到期|套餐|🈳|🈵|🉑)).*翟.*$"

  - name: ✈️ WD
    type: url-test
    url: http://cp.cloudflare.com/generate_204
    interval: 120
    use: [AllNodes]
    filter: "^(?!.*(500|Day|Expire|Traffic|Until|剩余|流量|到期|套餐|🈳|🈵|🉑)).*WD.*$"

  - name: ✈️ 付
    type: url-test
    url: http://cp.cloudflare.com/generate_204
    interval: 120
    use: [AllNodes]
    filter: "^(?!.*(500|Day|Expire|Traffic|Until|剩余|流量|到期|套餐|🈳|🈵|🉑)).*付.*$"

  - name: 🇭🇰 香港节点
    type: url-test
    url: https://www.youtube.com/generate_204
    interval: 120
    tolerance: 20
    use: [AllNodes]
    filter: "(港|HK|Hong Kong)"

  - name: 🇼🇸 台湾节点
    type: url-test
    url: https://www.youtube.com/generate_204
    interval: 120
    tolerance: 20
    use: [AllNodes]
    filter: "(台|新北|彰化|TW|Taiwan)"

  - name: 🇯🇵 日本节点
    type: url-test
    url: http://cp.cloudflare.com/generate_204
    interval: 120
    tolerance: 20
    use: [AllNodes]
    filter: "(日本|川日|东京|大阪|泉日|埼玉|沪日|深日|[^-]JP|Japan)"

  - name: 🇰🇷 韩国节点
    type: url-test
    url: http://cp.cloudflare.com/generate_204
    interval: 120
    tolerance: 20
    use: [AllNodes]
    filter: "(KR|Korea|KOR|首尔|韩|韓)"

  - name: 🇸🇬 狮城节点
    type: url-test
    url: http://cp.cloudflare.com/generate_204
    interval: 120
    tolerance: 20
    use: [AllNodes]
    filter: "(新加坡|坡|狮城|SG|Singapore)"

  - name: 🇺🇸 美国节点
    type: url-test
    url: https://chat.openai.com/cdn-cgi/trace
    interval: 120
    tolerance: 20
    use: [AllNodes]
    filter: "(美|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|Chicago|US|United States)"

  - name: 🛠️ 特殊节点
    type: select
    use: [AllNodes]
    filter: "^(?!.*(500|Day|Expire|Traffic|Until|剩余|流量|到期|🈳|🈵|🉑|港|HK|Hong Kong|台|新北|彰化|TW|Taiwan|日本|川日|东京|大阪|泉日|埼玉|沪日|深日|[^-]JP|Japan|KR|Korea|KOR|首尔|韩|韓|新加坡|坡|狮城|SG|Singapore|美|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|US|United States)).*"

  - name: 👉 手动切换
    type: select
    use: [AllNodes]
    filter: "(港|HK|Hong Kong|台|新北|彰化|TW|Taiwan|日本|川日|东京|大阪|泉日|埼玉|沪日|深日|[^-]JP|Japan|新加坡|坡|狮城|SG|Singapore|美|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|US|United States)"

  - name: ❗ YouTube
    type: select
    proxies: [🇼🇸 台湾节点, 🎯 总模式, 🇭🇰 香港节点, 🇺🇸 美国节点, 🇯🇵 日本节点, 🇰🇷 韩国节点, 🇸🇬 狮城节点, 🛠️ 特殊节点, 👉 手动切换, DIRECT]

  - name: 📺 Netflix
    type: select
    proxies: [🇭🇰 香港节点, 🎯 总模式, 🇼🇸 台湾节点, 🇺🇸 美国节点, 🇯🇵 日本节点, 🇰🇷 韩国节点, 🇸🇬 狮城节点, 🛠️ 特殊节点, 👉 手动切换, DIRECT]

  - name: 🤖 AI 服务
    type: select
    proxies: [🇺🇸 美国节点, 🎯 总模式, 🇭🇰 香港节点, 🇼🇸 台湾节点, 🇯🇵 日本节点, 🇰🇷 韩国节点, 🇸🇬 狮城节点, 🛠️ 特殊节点, 👉 手动切换, DIRECT]

  - name: ♨️ Lifestyle
    type: select
    proxies: [🎯 总模式, 🇺🇸 美国节点, 🇭🇰 香港节点, 🇼🇸 台湾节点, 🇯🇵 日本节点, 🇰🇷 韩国节点, 🇸🇬 狮城节点, 🛠️ 特殊节点, 👉 手动切换, DIRECT]

  - name: ⛩ 日韩媒体
    type: select
    proxies: [🇯🇵 日本节点, 🎯 总模式, 🇭🇰 香港节点, 🇼🇸 台湾节点, 🇺🇸 美国节点, 🇰🇷 韩国节点, 🇸🇬 狮城节点, 🛠️ 特殊节点, 👉 手动切换, DIRECT]

  - name: 🍏 苹果服务
    type: select
    proxies: [DIRECT, 🎯 总模式, 🇭🇰 香港节点, 🇼🇸 台湾节点, 🇺🇸 美国节点, 🇯🇵 日本节点, 🇰🇷 韩国节点, 🇸🇬 狮城节点, 🛠️ 特殊节点, 👉 手动切换]

  - name: 💠 微软服务
    type: select
    proxies: [DIRECT, 🎯 总模式, 🇭🇰 香港节点, 🇼🇸 台湾节点, 🇺🇸 美国节点, 🇯🇵 日本节点, 🇰🇷 韩国节点, 🇸🇬 狮城节点, 🛠️ 特殊节点, 👉 手动切换]

  - name: 🌐 谷歌服务
    type: select
    proxies: [🇺🇸 美国节点, 🎯 总模式, DIRECT, 🇭🇰 香港节点, 🇼🇸 台湾节点, 🇯🇵 日本节点, 🇰🇷 韩国节点, 🇸🇬 狮城节点, 🛠️ 特殊节点, 👉 手动切换]

  - name: 🇨🇳 国内网站
    type: select
    proxies: [DIRECT, 🎯 总模式]

  - name: 🎭 LiveShow
    type: select
    proxies: [🇺🇸 美国节点, 🎯 总模式, 🇭🇰 香港节点, 🇼🇸 台湾节点, 🇯🇵 日本节点, 🇰🇷 韩国节点, 🇸🇬 狮城节点, 🛠️ 特殊节点, 👉 手动切换, DIRECT]

  - name: 🛑 广告拦截
    type: select
    proxies: [REJECT, DIRECT]

  - name: ⭕ 漏网之鱼
    type: select
    proxies: [🎯 总模式, DIRECT]

