name: Update converter preset library

on:
  schedule:
    - cron: "23 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: converter-preset-discovery
  cancel-in-progress: false

jobs:
  discover-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Discover and verify public INI presets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python scripts/update-converter-presets.py
      - name: Publish verified manifest changes
        run: |
          if git diff --quiet -- converter-presets.json; then
            echo "Preset library is unchanged"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add converter-presets.json
          git commit -m "auto-update converter preset library"
          git push
